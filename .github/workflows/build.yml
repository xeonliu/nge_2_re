name: Build PSP Translation with Custom Docker

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Build Name'
        required: false
        type: string

jobs:
  build-in-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    # 1. 检出代码 (手动管理 Submodule)
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: false  # 关闭自动 submodule
        fetch-depth: 0
        persist-credentials: false

    # 2. 强制 Git 使用 PAT 访问所有 GitHub 仓库
    - name: Configure Git & Update Submodules
      run: |
        # 配置 URL 替换，强制带上 Token
        git config --global url."https://${{ secrets.GIT_PAT }}@github.com/".insteadOf "https://github.com/"
        
        # 现在手动更新 submodule，它会使用上面的配置
        echo "⬇️ Updating submodules..."
        git submodule update --init --recursive
        git submodule update --remote

    # 3. 登录 GHCR
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 4a. 恢复 ISO 缓存
    - name: Restore ISO Cache
      uses: actions/cache@v4
      id: cache-iso
      with:
        path: temp/*.iso
        key: iso-${{ secrets.HF_REPO_ID }}
        restore-keys: iso-

    # 4b. 安装 HF CLI 并下载 ISO（缓存未命中时）
    - name: Download ISO from Hugging Face
      if: steps.cache-iso.outputs.cache-hit != 'true'
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
      run: |
        echo "📦 Installing Hugging Face CLI..."
        curl -LsSf https://hf.co/cli/install.sh | bash
        export PATH="$HOME/.local/bin:$PATH"
        
        echo "⬇️ Downloading ISO from Hugging Face Repo: $HF_REPO_ID..."
        mkdir -p temp
        hf download "$HF_REPO_ID" ULJS00064.iso \
          --repo-type model \
          --token "$HF_TOKEN" \
          --local-dir temp
        hf download "$HF_REPO_ID" ULJS00061.iso \
          --repo-type model \
          --token "$HF_TOKEN" \
          --local-dir temp

    # 5. 根据 Dockerfile 哈希复用镜像；仅在未命中时构建
    - name: Resolve Docker Image Tag
      id: docker-tag
      run: |
        DOCKERFILE_HASH=$(sha256sum Dockerfile | cut -c1-16)
        echo "dockerfile_hash=$DOCKERFILE_HASH" >> "$GITHUB_OUTPUT"

    - name: Restore or Build Docker Image
      run: |
        set -euo pipefail

        IMAGE_BASE="ghcr.io/${{ github.repository_owner }}/psp-builder"
        IMAGE_BASE="${IMAGE_BASE,,}"
        HASH_TAG=${{ steps.docker-tag.outputs.dockerfile_hash }}
        HASH_IMAGE="$IMAGE_BASE:$HASH_TAG"
        LATEST_IMAGE="$IMAGE_BASE:latest"

        echo "🧩 Trying cached image: $HASH_IMAGE"
        if docker pull "$HASH_IMAGE"; then
          echo "✅ Cache hit. Reusing prebuilt image for this Dockerfile."
          docker tag "$HASH_IMAGE" psp-builder
        else
          echo "⚙️ Cache miss. Building new image..."

          # 尝试拉取 latest 作为额外缓存来源（失败不中断）
          docker pull "$LATEST_IMAGE" || true

          DOCKER_BUILDKIT=1 docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from "$LATEST_IMAGE" \
            --cache-from "$HASH_IMAGE" \
            -t psp-builder \
            -t "$HASH_IMAGE" \
            -t "$LATEST_IMAGE" \
            .

          echo "📤 Pushing cache images..."
          docker push "$HASH_IMAGE"
          docker push "$LATEST_IMAGE"
        fi

    # 6. 在容器内运行构建
    - name: Run Build inside Container
      env:
        AUTH_KEY: ${{ secrets.AUTH_KEY }}
      run: |
        mkdir -p build
        
        # 启动容器
        docker run --rm \
          -v "${{ github.workspace }}:/work" \
          -w /work \
          -e AUTH_KEY \
          -e HOME=/home/pspdev \
          -e PATH="/home/pspdev/.local/bin:/home/pspdev/pspdev/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
          psp-builder \
          /bin/bash -c '
            set -e
            
            echo "🔧 Configuring Git safe directory..."
            git config --global --add safe.directory "*"

            uv venv
            
            echo "⬇️ Downloading Translations..."
            make download_trans
            
            echo "🚀 Starting Full Build..."
            make full_build
          '

    # 7. Display metadata generated during build
    - name: Display Metadata
      run: |
        echo "📊 Build Metadata:"
        cat build/metadata.json | python3 -m json.tool || echo "metadata.json not found"

    # 8. Prepare release notes for tagged builds
    - name: Prepare Release Notes
      run: |
        python3 - <<'PY'
        from pathlib import Path
        import glob
        import os
        import zlib

        iso_paths = sorted(glob.glob("build/ULJS*_patched_*.iso"))
        if len(iso_paths) != 2:
            raise SystemExit(f"Expected 2 patched ISOs, found {len(iso_paths)}: {iso_paths}")

        ref_name = os.environ.get("GITHUB_REF_NAME", "unknown")
        lines = [
            f"# NGE2 Translation Release {ref_name}",
            "",
            "CRC32:",
        ]

        for iso_path in iso_paths:
            crc32 = zlib.crc32(Path(iso_path).read_bytes()) & 0xFFFFFFFF
            lines.append(f"- {Path(iso_path).name}: {crc32:08X}")

        Path("build/release_notes.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
        print("Wrote build/release_notes.md")
        PY

    # 9. Upload build artifacts including metadata
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PSP-Translation-Build
        path: |
          temp/downloads/downloaded.zip
          build/*.xdelta
          build/metadata.png
          build/evs_report.json
          build/eboot_report.json
          build/release_notes.md
        if-no-files-found: error

  release:
    name: Publish Release
    needs: build-in-docker
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: PSP-Translation-Build
          path: artifacts

      - name: Prepare release assets
        run: |
          set -euo pipefail

          mkdir -p release_assets

          find artifacts -name "*.xdelta" -type f -exec cp {} release_assets/ \;
          find artifacts -path "*/temp/downloads/downloaded.zip" -type f -exec cp {} release_assets/downloaded.zip \;
          find artifacts -name "release_notes.md" -type f -exec cp {} release_assets/release_notes.md \;

          ls -la release_assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_assets/release_notes.md
          files: |
            release_assets/*.xdelta
            release_assets/downloaded.zip