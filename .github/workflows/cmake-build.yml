name: C++ CMake Build (Cross-Platform)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'CMakeLists.txt'
      - 'cpp/**'
      - '.github/workflows/cmake-build.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'CMakeLists.txt'
      - 'cpp/**'
      - '.github/workflows/cmake-build.yml'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Linux (GCC, Release)"
            os: ubuntu-latest
            build_type: Release
            cmake_extra: "-DNGE2_USE_OPENMP=ON"

          - name: "Linux (GCC, Debug)"
            os: ubuntu-latest
            build_type: Debug
            cmake_extra: "-DNGE2_USE_OPENMP=ON"

          - name: "macOS (Clang, Release)"
            os: macos-latest
            build_type: Release
            # libomp may need to be installed; OpenMP is optional so fail is OK
            cmake_extra: "-DNGE2_USE_OPENMP=OFF"

          - name: "Windows (MSVC, Release)"
            os: windows-latest
            build_type: Release
            cmake_extra: "-DNGE2_USE_OPENMP=ON"

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. (Linux only) Install build prerequisites
      - name: Install prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libgomp1

      # 3. Configure
      - name: Configure CMake
        run: >
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_TESTING=ON
          -DNGE2_BUILD_ISO_TOOLS=ON
          ${{ matrix.cmake_extra }}

      # 4. Build
      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ matrix.build_type }} --parallel

      # 5. Test
      - name: Run tests (CTest)
        working-directory: ${{ github.workspace }}/build
        run: ctest -C ${{ matrix.build_type }} --output-on-failure

      # 6. Upload built binaries as artifacts
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: nge2-tools-${{ matrix.os }}-${{ matrix.build_type }}
          path: |
            ${{ github.workspace }}/build/**/nge2${{ runner.os == 'Windows' && '.exe' || '' }}
            ${{ github.workspace }}/build/**/nge2-unpack-iso${{ runner.os == 'Windows' && '.exe' || '' }}
            ${{ github.workspace }}/build/**/nge2-repack-iso${{ runner.os == 'Windows' && '.exe' || '' }}
          if-no-files-found: warn
